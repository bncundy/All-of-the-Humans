<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiry Received | All of the Humans</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <meta name="robots" content="noindex">
    
    <meta http-equiv="refresh" content="5;url=index.html">
    
    <link rel="stylesheet" href="custom.css">
    
    <style>
        /* --- POST-INQUIRY SPECIFIC LAYOUT --- */
        .thank-you-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background-color: var(--color-paper);
            padding: 0 var(--container-padding);
        }

        .thank-you-content {
            max-width: 800px;
            animation: softFadeIn 1.2s ease-out forwards;
            opacity: 0;
            transform: translateY(15px);
        }

        .redirect-text {
            margin-top: 50px;
            font-size: var(--text-xs);
            color: var(--color-light-gray);
            font-family: var(--font-sans);
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        @keyframes softFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 900px) {
            .thank-you-content h1 {
                font-size: 2.5rem !important;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">all of the humans</a>
        <div class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="about.html" class="nav-link">About</a>
            <a href="inquire.html" class="nav-link">Inquire</a>
        </div>
    </nav>

    <main class="thank-you-wrapper">
        <div class="thank-you-content">
            <span class="label-text">Message Received</span>
            
            <h1 class="tight-italic-header" style="font-size: 4.5rem; line-height: 1.1; margin-bottom: 20px;">
                Thank you for reaching out —<br>Sophie will be in touch soon.
            </h1>
            
            <p class="redirect-text">Redirecting you to the homepage in <span id="countdown">5</span>...</p>
            
            <a href="index.html" class="btn-text" style="margin-top: 30px; display: inline-block; font-size: var(--text-sm);">Return Home Now</a>
        </div>
    </main>

    <script src="custom.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let timeLeft = 5;
            const countdownEl = document.getElementById('countdown');
            
            const timer = setInterval(() => {
                timeLeft--;
                if (countdownEl) {
                    countdownEl.textContent = timeLeft;
                }
                if (timeLeft <= 0) {
                    clearInterval(timer);
                }
            }, 1000);
        });
    </script>

</body>
</html>
